name: LoveTypes predeploy check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  predeploy-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install audit dependencies
        run: python -m pip install --upgrade pip pillow

      - name: Install browser smoke dependencies
        run: |
          npm install --no-save --no-package-lock playwright
          npx playwright install --with-deps chromium

      - name: Run predeploy checks
        run: python tools/predeploy_check.py --visual
