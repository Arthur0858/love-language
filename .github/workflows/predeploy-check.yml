name: LoveTypes predeploy check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  predeploy-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install audit dependencies
        run: python -m pip install --upgrade pip pillow

      - name: Run structural predeploy checks
        run: python tools/predeploy_check.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install browser smoke dependencies
        run: |
          npm install --no-save --no-package-lock playwright
          npx playwright install --with-deps chromium

      - name: Run browser visual smoke
        run: |
          mkdir -p output
          python tools/predeploy_check.py --visual-only 2>&1 | tee output/predeploy-check.log
          test ${PIPESTATUS[0]} -eq 0

      - name: Upload predeploy evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: predeploy-evidence
          path: |
            output/predeploy-check.log
            output/playwright
          if-no-files-found: ignore
