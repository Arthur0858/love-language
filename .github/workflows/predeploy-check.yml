name: LoveTypes predeploy check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  predeploy-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install audit dependencies
        run: python -m pip install --upgrade pip pillow

      - name: Run predeploy checks
        run: python tools/predeploy_check.py
